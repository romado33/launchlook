# Example customer file for scripts/deliver_report.py.
# Copy to customers/{slug}.yaml (gitignored) and fill in real findings.
#
# Render and preview:
#   python scripts/deliver_report.py --customer customers/example-jane-sparkle.yaml
#
# Send via Resend (after RESEND_API_KEY is set in .env):
#   python scripts/deliver_report.py --customer customers/example-jane-sparkle.yaml --send

customer:
  first_name: Jane
  last_name: Smith
  email: jane@example.com
  app_name: Sparkle Marketplace
  app_url: https://sparkle.lovable.app
  url_redacted: false        # true to print "URL redacted" in the report
  tier: Starter Package      # Starter (cap 10) | Scale Up (cap 30) | Pro (cap 40)
  builder: Lovable           # used in the fix-prompt headers
  # Demo example: Starter caps at 10; this YAML deliberately ships 7 to show
  # well-under-cap output and to keep the rendered report short for review.

verdict:
  label: Needs fixes before launch
  emoji: "🔴"
  summary: Polished shell, three launch-stoppers we'd fix before you post the URL anywhere.
  narrative: |
    Sparkle Marketplace looks investor-ready in screenshots — then you click
    through. Dev shortcuts are still on the live URL, legal pages 404, the hero
    booking CTA fails, and mobile checkout is effectively broken. Clear the two
    critical items and the booking path before you share the link publicly.

findings:
  - severity: critical
    title: Anyone can skip login — dev bypass on the live URL
    what_we_saw: |
      Sparkle Marketplace's sign-in page ships with a "Dev Bypass (Skip Login)"
      button. One click opens a role picker and drops visitors into the app
      with no password.
    why_it_matters: |
      We catch this on most Lovable apps that shipped before a final "remove dev UI"
      pass. On a marketplace, strangers can act as hosts or buyers.
    screenshot_caption: /auth page with the Dev Bypass button visible.
    fix_prompt: |
      Remove the "Dev Bypass (Skip Login)" button, the "Choose Your Dev Role"
      modal, and all "For development purposes only" copy from /auth. Only
      show these when import.meta.env.DEV is true. Never on the published
      lovable.app URL.

  - severity: critical
    title: "Developer Tools" panel on the homepage customers see
    what_we_saw: |
      After sign-in, Sparkle's homepage shows a "Developer Tools" card with
      "Seed Sample Data" and "Clear My Data" — visible on the public URL.
    why_it_matters: |
      Paying users read this as "still in beta." It undercuts every polished pixel around it.
    fix_prompt: |
      Remove the "Developer Tools" / "Development Data Seeder" section from
      the published homepage. Gate the Seed and Clear data buttons behind
      import.meta.env.DEV only.

  - severity: high
    title: Privacy and Terms links go to 404
    what_we_saw: |
      Sparkle's footer promises legal pages, but both privacy and terms URLs
      return the app's 404 screen.
    why_it_matters: |
      Stripe and B2B buyers look for these before they trust you with money or data.
    screenshot_caption: Footer with broken Privacy and Terms links circled.
    fix_prompt: |
      Add /privacy and /terms routes with basic policy content. Link both
      from the footer on every page. Use jane@sparklemarket.com (or your
      real support email) in the contact section. Match the rest of the
      site's typography and spacing.

  - severity: high
    title: Hero "Quick Book" CTA dead-ends — zero bookable slots
    what_we_saw: |
      Sparkle's main "Quick Book" button opens a modal that says "No available
      slots found" and keeps "Book Now" disabled.
    why_it_matters: |
      Every visitor who tries to book hits a wall — and most won't email you about it.
    fix_prompt: |
      Fix Quick Book so available slots appear, OR hide Quick Book when
      no slots exist and show "No dates available yet, check back soon."

  - severity: high
    title: Booking modal breaks on mobile — CTA below the fold
    what_we_saw: |
      At phone width, Sparkle's Quick Book modal is taller than the screen. The
      time picker and "Book Now" button sit below the fold with no obvious scroll.
    why_it_matters: |
      Most vibe-coded launches get more than half their traffic on phones.
    fix_prompt: |
      On Sparkle's Quick Book modal, constrain height to the viewport, make the
      slot list scroll inside the modal, and pin "Book Now" above the safe area
      on mobile. Test on iPhone SE and 390px width.

  - severity: medium
    title: Listings show 4.5 stars with (0) reviews
    what_we_saw: |
      Cards display "4.5 (0)", a numeric rating with zero reviews.
    why_it_matters: |
      Reads like seeded test data, which kills trust on a marketplace.
    fix_prompt: |
      When the review count is 0, show "New" or "No reviews yet" instead of
      a numeric rating. Only show the star number once at least one real
      review exists.

  - severity: medium
    title: Every Sparkle listing says "Hosted by Local Host"
    what_we_saw: |
      Every Sparkle Marketplace experience card shows "Hosted by Local Host"
      instead of a real host name.
    why_it_matters: |
      Reads as placeholder data on a public marketplace.
    fix_prompt: |
      Replace "Hosted by Local Host" with each experience's actual host
      display name from the database. If missing, show first name + last
      initial or hide the line.

  - severity: low
    title: Sparkle has no share preview image
    what_we_saw: |
      Sparkle Marketplace's og:image is unset, so Slack and iMessage previews
      show a blank card when someone shares the app URL.
    why_it_matters: |
      First impression when someone shares Sparkle is blank, not branded.
    fix_prompt: |
      Add a 1200x630 og.png to /public, set og:image and twitter:image meta
      tags in index.html to /og.png. Verify with opengraph.xyz after deploy.

# Categories with no critical/high finding in this audit. Surfaced as a
# "What's working" callout in the rendered report (templates/report/report.html.j2).
passed_checks:
  - Mobile layout on Sparkle's listing and booking screens
  - Search, auth, and listing detail work aside from the dev-only UI
  - No other obvious launch blockers beyond the findings below

quick_start_guide:
  title: Sparkle Marketplace, Getting Started
  intro: |
    Sparkle is a marketplace for booking local experiences. This one-pager
    walks you through what to do in the first five minutes, so you can book
    your first slot or list your first experience without fumbling.
  steps:
    - title: Create your account
      body: |
        Tap "Sign up" in the top right, enter your email, and confirm with
        the link we send. You stay signed in on the device you used.
    - title: Pick a city or use your current location
      body: |
        From the home page, tap the city selector or "Use my location" to
        see experiences near you. Results sort by distance.
    - title: Open an experience and check the calendar
      body: |
        Each listing shows host name, photos, price, and an availability
        calendar. Green dots mean open slots.
    - title: Book a time slot
      body: |
        Tap a green slot, review the time and price, and tap "Book Now."
        Payment is handled by Stripe. You'll get a confirmation email
        within a minute.
    - title: Manage or cancel from "My Bookings"
      body: |
        Tap your avatar in the top right, then "My Bookings." Cancel up
        to 24 hours ahead for a full refund.
  footer_note: |
    Questions or stuck on a step? Reply to your booking email or write to
    hello@sparklemarket.com. We answer within a few hours.
