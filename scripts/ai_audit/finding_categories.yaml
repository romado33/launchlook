# Finding taxonomy for the AI audit pipeline.
#
# This file is the single source of truth for which categories the LLM
# considers when drafting findings. The pipeline loads this YAML at
# runtime and renders ``{categories_list}`` into the system prompt
# (see scripts/ai_audit/prompts/system.txt and the pattern documented in
# docs/AI-AUDIT-PIPELINE.md).
#
# Adding a category:
#   1. Append a new ``- id: ...`` block below.
#   2. Pick a buyer-facing display name that follows
#      docs/SIMPLICITY-GUARDRAILS.md §6 (no internal jargon, no taxonomy
#      codes; if a layperson wouldn't say it, don't put it here).
#   3. Provide a description_for_llm in plain English so the prompt can
#      walk the model through what to look for.
#   4. If the category is generated outside the LLM (e.g. by Snoop's
#      security_lite.py) set ``source: external`` so the prompt tells
#      the model not to regenerate it.
#   5. If the category should only apply at certain tiers, set
#      ``tier_min`` to the lowest tier that should see it.
#
# The Webflow-specific check list still lives in pipeline.py as a
# platform-conditional appendix (see PLATFORM_PROMPT_FILES). That
# architecture is unchanged: per-platform appendices and per-category
# prompt content compose additively.

categories:
  - id: trust_gaps
    display_name_buyer: "trust signals & legal pages"
    display_name_internal: "Trust gaps"
    severity_default: medium
    description_for_llm: >-
      Missing privacy policy, terms, contact info, dead footer links,
      sketchy or unclear URLs, missing or fake-looking testimonials,
      placeholder team cards, generic OG images on a payment-collecting
      site.
    tester: "The Skeptic"

  - id: broken_ctas_links
    display_name_buyer: "broken buttons & dead links"
    display_name_internal: "Broken CTAs / dead links"
    severity_default: high
    description_for_llm: >-
      CTAs that don't fire, primary action buttons that dead-end, footer
      links that 404, hash-only hrefs in production, "Quick Book" or
      "Get Started" flows that visibly stop working halfway through.
    tester: "The Klutz"

  - id: mobile_layout
    display_name_buyer: "mobile layout issues"
    display_name_internal: "Mobile audit"
    severity_default: medium
    description_for_llm: >-
      Tap targets too small, overflowing layouts, broken viewport,
      illegible text on mobile, hidden navigation, content cut off below
      a fold the customer doesn't realize is there.
    tester: "The Phone-First Friend"

  - id: copy_clarity
    display_name_buyer: "confusing or placeholder text"
    display_name_internal: "Copy & clarity"
    severity_default: medium
    description_for_llm: >-
      Lorem ipsum or "Heading goes here" / "Your text here" placeholders
      still in production, confusing CTAs, jargon a first-time visitor
      won't decode, internal product names leaking onto the marketing
      surface. Also check first-user orientation: can a cold visitor
      identify their immediate next step from the hero section alone,
      without scrolling? A hero CTA labelled "Get started" or "Try it
      free" with no accompanying benefit statement or specifics is a
      common gap — the visitor doesn't know what they're starting or
      what "free" means. Flag if the primary CTA is vague and the
      surrounding copy doesn't answer "what does this do and for whom?"
      within the first viewport.
    tester: "The Tourist"

  - id: dev_artifacts
    display_name_buyer: "dev tools and test data on the live site"
    display_name_internal: "Dev / test artifacts"
    severity_default: high
    description_for_llm: >-
      "Dev Bypass" sign-in buttons, "Developer Tools" panels, "Seed
      sample data" / "Clear my data" controls visible to real visitors,
      placeholder host or user names ("Hosted by Local Host", "John
      Doe"), seeded zero-review ratings ("4.5 (0)").
    tester: "The Klutz"

  - id: security_lite
    display_name_buyer: "obvious visible risks"
    display_name_internal: "Security-lite (Snoop)"
    severity_default: high
    description_for_llm: >-
      Pre-generated by scripts/ai_audit/security_lite.py. This category
      covers missing HSTS / CSP / X-Frame-Options / X-Content-Type-
      Options headers and any credential or admin-route leakage visible
      in the rendered HTML. Merge incoming Snoop findings into the final
      list; do not regenerate them yourself.
    tester: "The Snoop"
    source: external

  - id: cross_user_data
    display_name_buyer: "user data isolation"
    display_name_internal: "Cross-user data check"
    severity_default: high
    description_for_llm: >-
      Scale Up and Pro tiers only. With two real test accounts, confirm
      that one signed-in user cannot see, edit, or delete another user's
      records on shared screens (dashboard, profile, billing, exports).
      Skip entirely on Starter Package.
    tester: "The Snoop"
    tier_min: "Scale Up Package"

  - id: ai_sounding_copy
    display_name_buyer: "copy that sounds AI-written"
    display_name_internal: "AI-sounding copy detection"
    severity_default: medium
    description_for_llm: >-
      Detects copy that reads like AI generated it. Watch for: em-dashes
      in body copy, repeated tricolons ("comprehensive, elegant, and
      powerful"), filler phrases ("it's important to note that", "in
      today's fast-paced"), "let's", "delve into", "navigate the
      complexities", generic hero claims with no specifics, copy that
      says nothing about the actual product. Surface 2 to 3 examples max.
    tester: "The Tourist"

  - id: scale_ready_audit
    display_name_buyer: "growth-readiness checks"
    display_name_internal: "Scale-Ready (analytics / attribution / retention)"
    severity_default: medium
    description_for_llm: >-
      Once a vibe-coded site starts getting real traffic, these gaps
      cause silent revenue loss. Check for: (1) analytics installed
      (Plausible, Mixpanel, GA, PostHog, Fathom: any one); (2) conversion
      event tracked on the main CTA (form submit, checkout button,
      signup); (3) attribution surface: UTM parameters preserved in the
      URL after click, or a marketing attribution tool present; (4)
      retention surface: email capture present, or signed-in user state
      visible. Surface 2 to 4 findings if these are missing or
      misconfigured.
    tester: "The Snoop"
    tier_min: "Scale Up Package"

  - id: compliance_lite
    display_name_buyer: "common legal must-haves"
    display_name_internal: "Compliance-Lite (AI disclosure / accessibility statement / cookie banner / confirmation basics)"
    severity_default: medium
    description_for_llm: >-
      Six quick legal and trust signals most vibe-coded apps miss.
      Surface 1 to 4 findings; never exceed 4 for this category.
      (1) AI disclosure: if the site uses AI to generate user-facing
      content (chatbot, dynamic summaries), is that disclosed somewhere
      reasonable? (2) Accessibility statement: is there a one-line
      statement of accessibility commitment, even a placeholder?
      Required in EU, increasingly expected in US. (3) Cookie banner:
      if the site uses cookies for analytics or sessions, is there a
      consent banner? Required under GDPR if any EU traffic possible.
      Skip cookie check if no cookies are set. (4) Contact or lead
      forms with no consent checkbox: any form that collects an email
      address for marketing purposes should have an explicit opt-in
      checkbox or statement ("I agree to receive emails") to comply
      with GDPR / CAN-SPAM. Flag if absent and the form has no
      visible unsubscribe or opt-out path. (5) Purchase or booking
      confirmation page with no order reference: if the site has a
      payment or booking flow, the confirmation page should display a
      unique order or reference number. A blank "Thanks for your
      order!" page with no reference is a refund and support
      nightmare. Flag if visible. (6) Automated emails with no
      unsubscribe link: CAN-SPAM and GDPR both require a working
      unsubscribe mechanism in commercial emails. If the intake form
      copy implies ongoing marketing emails and there is no mention of
      unsubscribe, flag it as a low-severity compliance risk.
    tester: "The Skeptic"

  - id: performance_speed
    display_name_buyer: "performance & speed"
    display_name_internal: "Core Web Vitals translator (LCP / INP / CLS)"
    severity_default: medium
    description_for_llm: |
      Pre-generated by scripts/ai_audit/performance_speed.py from the
      PageSpeed Insights API (Google CrUX field data). Merge incoming
      findings into the final list; do not regenerate them yourself.
      Translates the three Core Web Vitals into plain English the buyer
      can act on:
        - LCP (Largest Contentful Paint): how fast the main image or
          headline appears on the page.
        - INP (Interaction to Next Paint): how fast the page responds
          to a tap or click.
        - CLS (Cumulative Layout Shift): how much things jump around
          while the page is loading.
      Tier-capped inside performance_speed.py: 1 finding in Starter
      (the worst metric), 3 findings in Scale Up (one per metric),
      full breakdown in Pro. Customer-facing copy is plain English
      only; the internal acronyms (LCP / INP / CLS) never appear on
      report or QSG surfaces.
    tester: "The Phone-First Friend"
    source: external

  - id: accessibility_checks
    display_name_buyer: "accessibility checks"
    display_name_internal: "axe-core accessibility (WCAG 2.1 AA visible-only)"
    severity_default: medium
    description_for_llm: |
      Pre-generated by scripts/ai_audit/accessibility_axe.py running
      axe-core inside the existing Playwright capture. Merge incoming
      findings into the final list; do not regenerate them yourself.
      Catches the 5 most common visible accessibility failures:
        - Missing alt text on images.
        - Insufficient color contrast on text.
        - Form fields with no label.
        - Buttons or links with no readable text.
        - Interactive elements unreachable by the Tab key.
      Plain-English explanations only; never says "WCAG" or "axe-core"
      on a customer surface (per SIMPLICITY-GUARDRAILS section 6).
      Tier-capped inside accessibility_axe.py: 1 finding in Starter
      (worst), 3 in Scale Up, all in Pro.
    tester: "The Phone-First Friend"
    source: external

  - id: form_submit_smoke
    display_name_buyer: "form & signup flows"
    display_name_internal: "Form-submit smoke test (The Stranger)"
    severity_default: high
    description_for_llm: |
      Pre-generated by scripts/ai_audit/form_smoke_test.py running
      Playwright against the customer's homepage. Merge incoming
      findings into the final list; do not regenerate them yourself.
      Detects <form> elements on the page, fills each with safe
      synthetic values (LaunchLook smoke-test fixtures so a customer
      can spot them in their inbox or database), submits, and watches
      for a thank-you state or success message. Flags forms that
      silently fail, don't submit, lose state, or fail required-field
      validation. Plain-English findings only ("Your newsletter signup
      form didn't confirm anything after submit"); never says
      "form-submit smoke test", "synthetic values", or "round-trip"
      on a customer surface, per SIMPLICITY-GUARDRAILS section 6
      (buyer-facing name only: "form & signup flows").
      Safety: checkout / payment forms, destructive-label forms
      (Delete, Cancel subscription, Unsubscribe), and forms listed in
      the customer YAML's form_smoke_test.blocked_forms are skipped
      automatically. Hard cap of 3 forms per audit to limit blast
      radius. The runner respects an opt-out (form_smoke_test.enabled:
      false on the customer YAML).
      Tier-capped inside form_smoke_test.py: 1 finding in Starter
      (worst), 3 in Scale Up, all in Pro. Pro tier additionally polls a
      disposable mailbox for up to 60 seconds to confirm a real
      confirmation email arrives.
    tester: "The Stranger Who Tried to Sign Up"
    source: external
