<div class="step-card" data-step>
  <div class="step-card__header">
    <span class="step-card__index" data-step-index>1</span>
    <input
      type="text"
      class="step-card__title"
      data-field="title"
      placeholder="Step title (e.g. Create your account)"
      autocomplete="off"
    />
    <button type="button" class="btn-icon" data-action="remove-step" aria-label="Remove step" title="Remove step">×</button>
  </div>
  <label class="field">
    <span class="field__label">Step body</span>
    <textarea
      class="field__input field__input--textarea"
      data-field="body"
      rows="3"
      placeholder="Plain-language instructions, written for the end user."
    ></textarea>
  </label>
</div>
